<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Recommendation Dashboard</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #1d4ed8;
            --accent-dark: #1e40af;
            --border: #dbe3f0;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 20px 64px;
        }

        .hero {
            margin-bottom: 28px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .search-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 26px;
        }

        .search-panel input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            outline: none;
        }

        .search-panel input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
        }

        .search-panel button {
            border: none;
            border-radius: 12px;
            padding: 14px 22px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .search-panel button:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }

        .status {
            min-height: 24px;
            margin-bottom: 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .job-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .job-title {
            margin: 0;
            font-size: 1.2rem;
        }

        .company {
            margin: 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .location {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
            background: #e5e7eb;
            color: #374151;
        }

        .score-badge.high {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .source {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .apply-button {
            display: inline-block;
            text-align: center;
            text-decoration: none;
            background: #111827;
            color: #fff;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 600;
        }

        .empty-state {
            background: var(--panel);
            border: 1px dashed var(--border);
            border-radius: 18px;
            padding: 28px;
            text-align: center;
            color: var(--muted);
        }

        @media (max-width: 700px) {
            .search-panel {
                grid-template-columns: 1fr;
            }

            .search-panel button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <section class="hero">
        <h1>Job Recommendation Dashboard</h1>
        <p>Search recent roles that match your skills and jump straight to the application link.</p>
    </section>

    <section class="search-panel">
        <input
                id="skillsInput"
                type="text"
                placeholder="Enter skills (e.g., Java, Spring Boot, SQL)"
                value="Java, Spring Boot, SQL"
        >
        <button id="getJobsButton" type="button">Get Jobs</button>
    </section>

    <div id="status" class="status"></div>
    <section id="results" class="results"></section>
</div>

<script>
    const BASE_URL = "http://localhost:8080";
    const skillsInput = document.getElementById("skillsInput");
    const getJobsButton = document.getElementById("getJobsButton");
    const resultsContainer = document.getElementById("results");
    const statusElement = document.getElementById("status");

    async function loadJobs() {
        const skills = skillsInput.value.trim();
        const query = skills ? `?skills=${encodeURIComponent(skills)}` : "";

        statusElement.textContent = "Loading jobs...";
        resultsContainer.innerHTML = "";

        try {
            const response = await fetch(`${BASE_URL}/jobs/top${query}`);
            if (!response.ok) {
                throw new Error(`Request failed with status ${response.status}`);
            }

            const jobs = await response.json();
            renderJobs(jobs);
            statusElement.textContent = `${jobs.length} jobs found.`;
        } catch (error) {
            statusElement.textContent = "Unable to load jobs right now.";
            resultsContainer.innerHTML = `<div class="empty-state">Something went wrong while fetching jobs.</div>`;
            console.error(error);
        }
    }

    function renderJobs(jobs) {
        if (!jobs.length) {
            resultsContainer.innerHTML = `<div class="empty-state">No matching jobs found for the selected skills.</div>`;
            return;
        }

        resultsContainer.innerHTML = jobs.map(job => {
            const score = Number(job.matchScore || 0).toFixed(1);
            const highScoreClass = Number(job.matchScore || 0) >= 70 ? "high" : "";

            return `
                <article class="job-card">
                    <div>
                        <h2 class="job-title">${escapeHtml(job.title || "Untitled Role")}</h2>
                        <p class="company">${escapeHtml(job.company || "Unknown Company")}</p>
                        <p class="location">${escapeHtml(job.location || "India")}</p>
                    </div>
                    <div class="meta-row">
                        <span class="score-badge ${highScoreClass}">Match ${score}%</span>
                        <span class="source">${escapeHtml(job.source || "Unknown Source")}</span>
                    </div>
                    <a class="apply-button" href="${escapeAttribute(job.applyLink || "#")}" target="_blank" rel="noopener noreferrer">
                        Apply Now
                    </a>
                </article>
            `;
        }).join("");
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function escapeAttribute(value) {
        return escapeHtml(value);
    }

    getJobsButton.addEventListener("click", loadJobs);
    window.addEventListener("load", loadJobs);
</script>
</body>
</html>

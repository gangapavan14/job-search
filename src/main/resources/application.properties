spring.application.name=job-recommendation-system

# Configure these from your environment to enable live jobs from Adzuna.
app.providers.adzuna.base-url=https://api.adzuna.com/v1/api
app.providers.adzuna.country=in
app.providers.adzuna.location=India
app.providers.adzuna.results-per-page=20
app.providers.adzuna.app-id=${ADZUNA_APP_ID:}
app.providers.adzuna.app-key=${ADZUNA_APP_KEY:}
